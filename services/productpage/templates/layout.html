<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookinfo — Product Page</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        // Treat 422 (validation errors) and 502 (upstream failure) as
        // swap-eligible so the partialRatingSubmit handler's error
        // template visibly replaces the form section. Other 4xx/5xx
        // responses keep the default error behavior.
        htmx.config.responseHandling = [
            { code: '204', swap: false },
            { code: '[23]..', swap: true },
            { code: '422', swap: true },
            { code: '502', swap: true },
            { code: '[45]..', swap: false, error: true },
            { code: '...', swap: false }
        ];
    </script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222531;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-muted: #8b8d98;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --star-filled: #f59e0b;
            --star-empty: #3f4150;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }

        .nav-brand svg {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 0.5rem 0;
            transition: color 0.15s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
        }

        .nav-links a.active {
            border-bottom: 2px solid var(--accent);
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        /* Main layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Product list page */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            text-decoration: none;
            display: block;
            color: var(--text);
        }

        .product-card:hover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }

        .product-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .product-card .author {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .product-card .meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Stars */
        .stars {
            display: inline-flex;
            gap: 2px;
        }

        .star {
            width: 16px;
            height: 16px;
        }

        .star-filled {
            color: var(--star-filled);
        }

        .star-empty {
            color: var(--star-empty);
        }

        .rating-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Product detail page */
        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .detail-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .detail-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .detail-header .author {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .badge {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Details table */
        .details-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .details-grid dt {
            color: var(--text-muted);
            font-weight: 500;
        }

        .details-grid dd {
            color: var(--text);
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .rating-summary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Reviews */
        .review {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .review:last-child {
            border-bottom: none;
        }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .reviewer-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .reviewer-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .review-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Rating form */
        .rating-form {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .rating-form h3 {
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-size: 0.875rem;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group select option {
            background: var(--bg);
            color: var(--text);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Notification banner */
        .notification-banner {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
        }

        .notification-banner svg {
            color: var(--success);
            flex-shrink: 0;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: #f87171;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state p {
            margin-bottom: 1rem;
        }

        pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            margin-bottom: 8px;
        }

        /* Pending review */
        .review-pending {
            border: 1px dashed rgba(245, 158, 11, 0.4);
            border-radius: 6px;
            background: rgba(245, 158, 11, 0.03);
            padding: 0.75rem;
            margin-top: 0.5rem;
        }

        .review-pending:last-child {
            border-bottom: 1px dashed rgba(245, 158, 11, 0.4);
        }

        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--warning);
            font-size: 0.65rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .pending-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--warning);
            display: inline-block;
            animation: pending-pulse 1.5s ease-in-out infinite;
        }

        @keyframes pending-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Deleting review */
        .review-deleting {
            border: 1px dashed rgba(239, 68, 68, 0.4);
            border-radius: 6px;
            background: rgba(239, 68, 68, 0.03);
            padding: 0.75rem;
            margin-top: 0.5rem;
            opacity: 0.6;
        }

        .deleting-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #ef4444;
            font-size: 0.65rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .deleting-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            animation: pending-pulse 1.5s ease-in-out infinite;
        }

        .btn-delete-review {
            background: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 4px;
            color: #ef4444;
            cursor: pointer;
            padding: 0.25rem 0.4rem;
            display: inline-flex;
            align-items: center;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .btn-delete-review:hover {
            opacity: 1;
            background: rgba(239, 68, 68, 0.1);
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0 0.5rem;
        }

        .pagination-info {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        Bookinfo
    </a>
    <ul class="nav-links">
        <li><a href="/" class="active">Products</a></li>
    </ul>
    <div class="nav-status">
        <span class="status-dot"></span>
        All services healthy
    </div>
</nav>

<div class="container">
    {{block "content" .}}{{end}}
</div>

</body>
</html>
