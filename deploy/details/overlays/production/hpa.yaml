apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: details
  labels:
    app: details
    part-of: event-driven-bookinfo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: details
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
