# deploy/platform/local/jetstream/nats-values.yaml
#
# Values for the official nats-io/nats Helm chart (charts.nats.io).
# Single-replica JetStream for local dev. Token auth via the
# nats-client-token secret (created separately by k8s-platform).
#
# Storage notes: fileStore is enabled with pvc.enabled=false, which means
# the chart does NOT mount any volume at /data — JetStream writes into
# the container's writable layer. On k3d that's the host's containerd
# scratch space and gets wiped when the cluster is torn down, which is
# the right local-dev behaviour. For any non-local environment, switch
# to pvc.enabled=true (or memoryStore) and re-evaluate.
# Auth note: basic auth (user/password) instead of token because
# Argo Events' jetstreamExotic driver hardcodes AuthStrategyBasic
# whenever an accessSecret is configured (see argo-events
# pkg/eventbus/driver.go GetAuth). Single global creds shared by
# the EventBus, EventSource pods, and application producers — all
# read the same values from nats-client-token in two formats
# (raw user/password keys + auth.yaml YAML for argo-events).
#
# Server-side creds hardcoded here because the chart serialises
# config.merge to JSON, which prevents NATS env-var substitution
# from resolving $VAR references inside quoted strings. They MUST
# match the values in nats-token-secret.yaml. Local-dev only.
config:
  cluster:
    enabled: false
  jetstream:
    enabled: true
    fileStore:
      enabled: true
      pvc:
        enabled: false
        size: 1Gi
  merge:
    authorization:
      user: bookinfo
      password: local-dev-secret
container:
  image:
    repository: nats
    tag: 2.10-alpine
service:
  enabled: true
  ports:
    nats:
      enabled: true
podTemplate:
  topologySpreadConstraints: {}
