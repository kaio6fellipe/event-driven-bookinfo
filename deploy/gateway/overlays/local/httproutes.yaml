# POST /v1/details → book-added EventSource (write path)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: details-write
  namespace: bookinfo
spec:
  parentRefs:
    - name: default-gw
      namespace: platform
      sectionName: web
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/details
          method: POST
      backendRefs:
        - name: book-added-eventsource-svc
          port: 12000
---
