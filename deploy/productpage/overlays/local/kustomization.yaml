apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bookinfo

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: productpage
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: productpage

images:
  - name: event-driven-bookinfo/productpage
    newTag: local
