apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-load-generator
  labels:
    app: k6-load-generator
    part-of: event-driven-bookinfo
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app: k6-load-generator
        spec:
          restartPolicy: Never
          containers:
            - name: k6
              image: grafana/k6:latest
              command:
                - k6
                - run
                - -o
                - experimental-prometheus-rw
                - /scripts/bookinfo-traffic.js
              env:
                - name: BASE_URL
                  value: "http://gateway.envoy-gateway-system.svc.cluster.local"
                - name: DURATION
                  value: "5m"
                - name: BASE_RATE
                  value: "1"
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: "http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090/api/v1/write"
              volumeMounts:
                - name: k6-scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: k6-scripts
              configMap:
                name: k6-bookinfo-traffic
