# deploy/platform/local/jetstream/nats-token-secret.yaml
#
# Local-dev shared NATS token. Mirrored into both namespaces because
# different consumers expect different file shapes:
#
#   - key 'token' (raw string) — consumed by application pods as
#     NATS_TOKEN env via valueFrom.secretKeyRef in the chart's
#     deployment.yaml. The Go nats.go client wants the raw token value.
#
#   - key 'auth.yaml' (YAML structure) — consumed by Argo Events
#     EventBus accessSecret + EventSource accessSecret. Argo Events
#     mounts the value at /etc/eventbus/auth/auth.yaml and unmarshals
#     it via Viper into AuthCredential{Token, Username, Password}.
#     A raw string fails the unmarshal, so the value must be YAML.
#
#   - platform namespace: scoped to the EventBus accessSecret reference.
#   - bookinfo namespace:  scoped to EventSource accessSecret references
#     and pod NATS_TOKEN envs.
#
# Token value MUST match nats-values.yaml's config.merge.authorization.token
# (server-side). Local-only; plain text. Replace with a sealed/external
# secret in any non-local environment.
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: platform
type: Opaque
stringData:
  token: "local-dev-token"
  auth.yaml: |
    token: local-dev-token
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: bookinfo
type: Opaque
stringData:
  token: "local-dev-token"
  auth.yaml: |
    token: local-dev-token
