{{/* charts/bookinfo-service/templates/nats-eventsource.yaml */}}
{{/*
  Argo Events does not have a 'jetstream:' EventSource type — JetStream
  subjects are consumed via the 'nats:' EventSource (NATS pub/sub
  subscription on the JetStream subject). The EventBus itself is
  jetstreamExotic, but the bridge from a JetStream subject into the
  EventBus is a 'nats' EventSource.
*/}}
{{- if eq .Values.events.bus.type "jetstream" }}
{{- range $eventName, $event := .Values.events.exposed }}
---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: {{ include "bookinfo-service.fullname" $ }}-{{ $eventName }}
  labels:
    {{- include "bookinfo-service.labels" $ | nindent 4 }}
  {{- with $event.eventTypes }}
  annotations:
    bookinfo.io/emitted-ce-types: {{ join "," . | quote }}
  {{- end }}
spec:
  eventBusName: default
  template:
    serviceAccountName: {{ include "bookinfo-service.serviceAccountName" $ }}
    {{- with $.Values.observability.otelEndpoint }}
    container:
      env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ . | quote }}
        - name: OTEL_SERVICE_NAME
          value: {{ printf "%s-%s-eventsource" (include "bookinfo-service.fullname" $) $eventName | quote }}
    {{- end }}
  nats:
    {{ $eventName }}:
      url: {{ required "events.jetstream.url must be set when bus.type=jetstream and events.exposed is defined" $.Values.events.jetstream.url | quote }}
      subject: {{ required (printf "events.exposed.%s.topic is required (used as NATS subject)" $eventName) $event.topic | quote }}
      jsonBody: true
      auth:
        basic:
          username:
            name: {{ $.Values.events.jetstream.tokenSecret.name | quote }}
            key:  {{ $.Values.events.jetstream.tokenSecret.userKey | quote }}
          password:
            name: {{ $.Values.events.jetstream.tokenSecret.name | quote }}
            key:  {{ $.Values.events.jetstream.tokenSecret.passwordKey | quote }}
      {{- if $.Values.events.jetstream.tlsInsecure }}
      tls:
        enabled: true
        insecureSkipVerify: true
      {{- end }}
{{- end }}
{{- end }}
