# deploy/platform/local/jetstream/nats-values.yaml
#
# Values for the official nats-io/nats Helm chart (charts.nats.io).
# Single-replica JetStream for local dev. Token auth via the
# nats-client-token secret (created separately by k8s-platform).
#
# Storage notes: fileStore is enabled with pvc.enabled=false, which means
# the chart does NOT mount any volume at /data — JetStream writes into
# the container's writable layer. On k3d that's the host's containerd
# scratch space and gets wiped when the cluster is torn down, which is
# the right local-dev behaviour. For any non-local environment, switch
# to pvc.enabled=true (or memoryStore) and re-evaluate.
# Auth note: the chart serialises config.merge to JSON, which means
# any "$TOKEN" reference becomes a literal quoted string ("$TOKEN")
# rather than an env-var substitution (NATS only resolves $VAR
# outside quoted strings). So the server-side token is hardcoded
# here — it must match the value in nats-token-secret.yaml, which
# the EventBus accessSecret + pod NATS_TOKEN consume client-side.
# Local-dev only.
config:
  cluster:
    enabled: false
  jetstream:
    enabled: true
    fileStore:
      enabled: true
      pvc:
        enabled: false
        size: 1Gi
  merge:
    authorization:
      token: local-dev-token
container:
  image:
    repository: nats
    tag: 2.10-alpine
service:
  enabled: true
  ports:
    nats:
      enabled: true
podTemplate:
  topologySpreadConstraints: {}
