apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bookinfo

resources:
  - ../../base
  - deployment-write.yaml
  - service-write.yaml

patches:
  - path: deployment-read-patch.yaml
    target:
      kind: Deployment
      name: reviews
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: reviews

images:
  - name: event-driven-bookinfo/reviews
    newTag: local
