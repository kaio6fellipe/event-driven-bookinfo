apiVersion: v1
kind: ConfigMap
metadata:
  name: productpage
  labels:
    app: productpage
    part-of: event-driven-bookinfo
data:
  HTTP_PORT: "8080"
  ADMIN_PORT: "9090"
  LOG_LEVEL: "info"
  STORAGE_BACKEND: "memory"
  SERVICE_NAME: "productpage"
  DETAILS_SERVICE_URL: "http://details"
  REVIEWS_SERVICE_URL: "http://reviews"
  RATINGS_SERVICE_URL: "http://ratings"
  TEMPLATE_DIR: "/templates"
