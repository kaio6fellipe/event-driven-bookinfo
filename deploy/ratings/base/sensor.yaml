apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: rating-submitted-sensor
spec:
  eventBusName: kafka
  dependencies:
    - name: rating-submitted-dep
      eventSourceName: rating-submitted
      eventName: rating-submitted
  triggers:
    - template:
        name: create-rating
        http:
          url: http://ratings/v1/ratings
          method: POST
          headers:
            Content-Type: application/json
          payload:
            - src:
                dependencyName: rating-submitted-dep
                dataKey: body
              dest: ""
      atLeastOnce: true
      retryStrategy:
        steps: 3
        duration: 2s
        factor: 2.0
        jitter: 1
      dlqTrigger:
        template:
          name: dlq-create-rating
          http:
            url: http://dlq-event-received-eventsource-svc.bookinfo.svc.cluster.local:12004/dlq-event-received
            method: POST
            headers:
              Content-Type: application/json
            payload:
              - src:
                  dependencyName: rating-submitted-dep
                  dataKey: body
                dest: original_payload
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: id
                dest: event_id
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: type
                dest: event_type
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: source
                dest: event_source
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: subject
                dest: event_subject
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: time
                dest: event_timestamp
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: datacontenttype
                dest: datacontenttype
              - src:
                  dependencyName: rating-submitted-dep
                  dataKey: header
                dest: original_headers
              - src:
                  dependencyName: rating-submitted-dep
                  value: "rating-submitted-sensor"
                dest: sensor_name
              - src:
                  dependencyName: rating-submitted-dep
                  value: "create-rating"
                dest: failed_trigger
              - src:
                  dependencyName: rating-submitted-dep
                  value: "http://rating-submitted-eventsource-svc.bookinfo.svc.cluster.local:12002/rating-submitted"
                dest: eventsource_url
              - src:
                  dependencyName: rating-submitted-dep
                  value: "bookinfo"
                dest: namespace
        atLeastOnce: true
        retryStrategy:
          steps: 5
          duration: 2s
          factor: 2.0
          jitter: 1
    - template:
        name: notify-rating-submitted
        http:
          url: http://notification/v1/notifications
          method: POST
          headers:
            Content-Type: application/json
          payload:
            - src:
                dependencyName: rating-submitted-dep
                dataKey: body.product_id
              dest: subject
            - src:
                dependencyName: rating-submitted-dep
                value: "New rating submitted"
              dest: body
            - src:
                dependencyName: rating-submitted-dep
                value: "system@bookinfo"
              dest: recipient
            - src:
                dependencyName: rating-submitted-dep
                value: "email"
              dest: channel
      atLeastOnce: true
      retryStrategy:
        steps: 3
        duration: 2s
        factor: 2.0
        jitter: 1
      dlqTrigger:
        template:
          name: dlq-notify-rating-submitted
          http:
            url: http://dlq-event-received-eventsource-svc.bookinfo.svc.cluster.local:12004/dlq-event-received
            method: POST
            headers:
              Content-Type: application/json
            payload:
              - src:
                  dependencyName: rating-submitted-dep
                  dataKey: body
                dest: original_payload
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: id
                dest: event_id
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: type
                dest: event_type
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: source
                dest: event_source
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: subject
                dest: event_subject
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: time
                dest: event_timestamp
              - src:
                  dependencyName: rating-submitted-dep
                  contextKey: datacontenttype
                dest: datacontenttype
              - src:
                  dependencyName: rating-submitted-dep
                  dataKey: header
                dest: original_headers
              - src:
                  dependencyName: rating-submitted-dep
                  value: "rating-submitted-sensor"
                dest: sensor_name
              - src:
                  dependencyName: rating-submitted-dep
                  value: "notify-rating-submitted"
                dest: failed_trigger
              - src:
                  dependencyName: rating-submitted-dep
                  value: "http://rating-submitted-eventsource-svc.bookinfo.svc.cluster.local:12002/rating-submitted"
                dest: eventsource_url
              - src:
                  dependencyName: rating-submitted-dep
                  value: "bookinfo"
                dest: namespace
        atLeastOnce: true
        retryStrategy:
          steps: 5
          duration: 2s
          factor: 2.0
          jitter: 1
