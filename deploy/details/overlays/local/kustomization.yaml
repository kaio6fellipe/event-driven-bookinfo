apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bookinfo

resources:
  - ../../base
  - deployment-write.yaml
  - service-write.yaml
  - eventsource-service.yaml

patches:
  - path: deployment-read-patch.yaml
    target:
      kind: Deployment
      name: details
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: details
  - path: eventsource-patch.yaml
    target:
      kind: EventSource
      name: book-added
  - path: sensor-patch.yaml
    target:
      kind: Sensor
      name: book-added-sensor

images:
  - name: event-driven-bookinfo/details
    newTag: local
