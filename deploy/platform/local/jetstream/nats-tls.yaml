# deploy/platform/local/jetstream/nats-tls.yaml
#
# Self-signed TLS cert for the local NATS server, generated by
# cert-manager. Required because Argo Events' jetstreamExotic driver
# unconditionally wraps the NATS connection in TLS (with
# InsecureSkipVerify when no client TLS config is provided), so the
# server side must speak TLS even though the local-dev setup does
# no actual cert verification.
#
# Issuer is namespace-scoped (Issuer, not ClusterIssuer) since this
# only serves the platform-namespace NATS pod.
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: nats-selfsigned
  namespace: platform
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nats-server-tls
  namespace: platform
spec:
  secretName: nats-server-tls
  duration: 8760h          # 1 year — local-dev only
  renewBefore: 720h        # 30 days
  issuerRef:
    name: nats-selfsigned
    kind: Issuer
  commonName: nats.platform.svc.cluster.local
  dnsNames:
    - nats.platform.svc.cluster.local
    - nats.platform.svc
    - nats.platform
    - nats
    - localhost
