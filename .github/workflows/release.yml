name: Release

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to release"
        required: true
        type: choice
        options:
          - productpage
          - details
          - reviews
          - ratings
          - notification
          - dlqueue
      tag:
        description: "Full tag (e.g., details-v0.1.0)"
        required: true
        type: string

permissions: {}

jobs:
  release:
    name: Release ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ inputs.tag }}"
          SERVICE="${{ inputs.service }}"
          if [[ ! "$TAG" =~ ^${SERVICE}-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format '${SERVICE}-vX.Y.Z'"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#${{ inputs.service }}-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing ${{ inputs.service }} at $VERSION"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"

      - name: Set up QEMU (multi-platform Docker builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create local version tag for GoReleaser
        run: git tag "${{ steps.version.outputs.version }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f services/${{ inputs.service }}/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.service }} ${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*.tar.gz

      - name: Generate artifact hashes
        id: hash
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          echo "hashes=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA provenance
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ inputs.tag }}
