name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run go vet
        run: make vet

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run tests with race detector
        run: make test-race

      - name: Run tests with coverage (combined)
        run: make test-cover

      - name: Generate per-service coverage profiles
        run: |
          set -euo pipefail
          mkdir -p coverage
          for svc in productpage details reviews ratings notification dlqueue; do
            go test -coverprofile="coverage/coverage-$svc.out" "./services/$svc/..." || \
              echo "mode: set" > "coverage/coverage-$svc.out"
          done

      - name: Upload per-service coverage profiles
        uses: actions/upload-artifact@v4
        with:
          name: coverage-per-service
          path: coverage/coverage-*.out
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
          retention-days: 7

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  govulncheck:
    name: Vulnerability Scan (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: make vuln

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, vet, test, govulncheck, gitleaks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build all services
        run: make build-all

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Docker Build + Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: make docker-build-all

      - name: Install Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/productpage:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan details image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/details:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan reviews image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/reviews:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan ratings image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/ratings:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan notification image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/notification:latest
          severity: HIGH,CRITICAL
          exit-code: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests
        run: make e2e

  e2e-postgres:
    name: E2E Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests with PostgreSQL backend
        run: make e2e-postgres
