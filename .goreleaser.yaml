version: 2

project_name: event-driven-bookinfo

builds:
  - id: productpage
    binary: productpage
    main: ./services/productpage/cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: details
    binary: details
    main: ./services/details/cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: reviews
    binary: reviews
    main: ./services/reviews/cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: ratings
    binary: ratings
    main: ./services/ratings/cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: notification
    binary: notification
    main: ./services/notification/cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: productpage
    builds:
      - productpage
    name_template: "productpage_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

  - id: details
    builds:
      - details
    name_template: "details_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

  - id: reviews
    builds:
      - reviews
    name_template: "reviews_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

  - id: ratings
    builds:
      - ratings
    name_template: "ratings_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

  - id: notification
    builds:
      - notification
    name_template: "notification_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

dockers:
  - id: productpage-amd64
    ids:
      - productpage
    image_templates:
      - "ghcr.io/kaio6fellipe/event-driven-bookinfo/productpage:{{ .Tag }}-amd64"
    dockerfile: build/Dockerfile.productpage
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title=productpage"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

  - id: productpage-arm64
    ids:
      - productpage
    image_templates:
      - "ghcr.io/kaio6fellipe/event-driven-bookinfo/productpage:{{ .Tag }}-arm64"
