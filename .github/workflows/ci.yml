name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

  vet:
    name: Vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Run go vet
        run: make vet

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Run tests with race detector
        run: make test-race

      - name: Run tests with coverage (combined)
        run: make test-cover

      - name: Generate per-service coverage profiles
        run: |
          set -euo pipefail
          mkdir -p coverage
          for svc in productpage details reviews ratings notification dlqueue; do
            go test -coverprofile="coverage/coverage-$svc.out" "./services/$svc/..." || \
              echo "mode: set" > "coverage/coverage-$svc.out"
          done

      - name: Upload per-service coverage profiles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-per-service
          path: coverage/coverage-*.out
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
          retention-days: 7

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  govulncheck:
    name: Vulnerability Scan (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: make vuln

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, vet, test, govulncheck, gitleaks]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Build all services
        run: make build-all

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Docker Build + Scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build all Docker images
        run: make docker-build-all

      - name: Install Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/productpage:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan details image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/details:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan reviews image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/reviews:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan ratings image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/ratings:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan notification image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — pinned by SHA due to March 2026 supply chain attack
        with:
          scan-type: image
          image-ref: event-driven-bookinfo/notification:latest
          severity: HIGH,CRITICAL
          exit-code: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run E2E tests
        run: make e2e

  e2e-postgres:
    name: E2E Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run E2E tests with PostgreSQL backend
        run: make e2e-postgres

  coverage-badges:
    name: Publish coverage badges
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"

      - name: Download per-service coverage profiles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-per-service
          path: ${{ runner.temp }}/coverage

      - name: Generate badge JSON
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/badges-out"
          color_for() {
            local pct=$1
            local n=${pct%.*}
            if   [ "$n" -ge 80 ]; then echo brightgreen
            elif [ "$n" -ge 70 ]; then echo green
            elif [ "$n" -ge 60 ]; then echo yellowgreen
            elif [ "$n" -ge 50 ]; then echo yellow
            elif [ "$n" -ge 40 ]; then echo orange
            else                       echo red
            fi
          }
          for svc in productpage details reviews ratings notification dlqueue; do
            profile="${RUNNER_TEMP}/coverage/coverage-$svc.out"
            if [ ! -s "$profile" ] || [ "$(wc -l < "$profile")" -le 1 ]; then
              pct="0.0"
            else
              # go tool cover needs to run from a dir with go.mod (we're on main)
              pct=$(go tool cover -func="$profile" | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
              if [ -z "$pct" ]; then pct="0.0"; fi
            fi
            color=$(color_for "$pct")
            printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s","cacheSeconds":60}\n' \
              "$pct" "$color" > "${RUNNER_TEMP}/badges-out/coverage-$svc.json"
            echo "$svc -> $pct% ($color)"
          done

      - name: Publish to badges branch
        run: |
          set -euo pipefail
          git worktree add -B badges badges-wt origin/badges
          cp "${RUNNER_TEMP}/badges-out/"coverage-*.json badges-wt/
          cd badges-wt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-*.json
          if git diff --cached --quiet; then
            echo "No badge changes — nothing to publish"
            exit 0
          fi
          git commit -m "chore(badges): update coverage [skip ci]"
          git push origin badges
