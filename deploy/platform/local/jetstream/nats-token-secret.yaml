# deploy/platform/local/jetstream/nats-token-secret.yaml
#
# Local-dev shared NATS basic-auth credentials. Mirrored into both
# namespaces because different consumers expect different file shapes:
#
#   - keys 'username' + 'password' — consumed by application pods as
#     NATS_USER + NATS_PASSWORD env via valueFrom.secretKeyRef in the
#     chart's deployment.yaml. The Go nats.go client wraps these in
#     nats.UserInfo() at producer construction.
#
#   - key 'auth.yaml' (YAML structure with username + password) —
#     consumed by Argo Events EventBus + EventSource accessSecret.
#     Argo Events mounts the value at /etc/eventbus/auth/auth.yaml and
#     unmarshals it via Viper into AuthCredential{Token, Username,
#     Password}. The driver forces AuthStrategyBasic when accessSecret
#     is set (see argo-events pkg/eventbus/driver.go GetAuth), so the
#     credentials must be username + password.
#
# Values MUST match nats-values.yaml's config.merge.authorization
# (server-side). Local-only; plain text. Replace with a sealed/external
# secret in any non-local environment.
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: platform
type: Opaque
stringData:
  username: "bookinfo"
  password: "local-dev-secret"
  auth.yaml: |
    username: bookinfo
    password: local-dev-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: bookinfo
type: Opaque
stringData:
  username: "bookinfo"
  password: "local-dev-secret"
  auth.yaml: |
    username: bookinfo
    password: local-dev-secret
