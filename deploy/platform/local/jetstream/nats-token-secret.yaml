# deploy/platform/local/jetstream/nats-token-secret.yaml
#
# Local-dev shared NATS token. Mirrored into both namespaces:
#   - platform: consumed by the NATS server pod env (TOKEN var) and by
#     the Argo Events EventBus accessSecret reference.
#   - bookinfo: consumed by the Argo Events EventSource pods (rendered
#     by the chart's jetstream-eventsource template) and by the
#     application Pods' NATS_TOKEN env (sourced from this secret via
#     valueFrom.secretKeyRef in deployment.yaml).
#
# Plain-text only acceptable in local-only context. Replace with a
# sealed/external-secret in any non-local environment.
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: platform
type: Opaque
stringData:
  token: "local-dev-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-client-token
  namespace: bookinfo
type: Opaque
stringData:
  token: "local-dev-token"
