apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlqueue
  labels:
    role: read
spec:
  replicas: 1
  template:
    metadata:
      labels:
        role: read
    spec:
      containers:
        - name: dlqueue
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits: {}
