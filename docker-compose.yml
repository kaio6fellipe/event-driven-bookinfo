# Local development compose file.
# Usage: make run | make run-logs | make stop | make seed
#   or:  docker compose up --build
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bookinfo
      POSTGRES_PASSWORD: bookinfo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./dev/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bookinfo"]
      interval: 2s
      timeout: 5s
      retries: 5

  ratings:
    build:
      context: .
      dockerfile: build/Dockerfile.ratings
    ports:
      - "8081:8080"
      - "9091:9090"
    environment:
      SERVICE_NAME: ratings
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://bookinfo:bookinfo@postgres:5432/bookinfo_ratings?sslmode=disable
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  details:
    build:
      context: .
      dockerfile: build/Dockerfile.details
    ports:
      - "8082:8080"
      - "9092:9090"
    environment:
      SERVICE_NAME: details
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://bookinfo:bookinfo@postgres:5432/bookinfo_details?sslmode=disable
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  reviews:
    build:
      context: .
      dockerfile: build/Dockerfile.reviews
    ports:
      - "8083:8080"
      - "9093:9090"
    environment:
      SERVICE_NAME: reviews
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://bookinfo:bookinfo@postgres:5432/bookinfo_reviews?sslmode=disable
      RUN_MIGRATIONS: "true"
      RATINGS_SERVICE_URL: http://ratings:8080
    depends_on:
      postgres:
        condition: service_healthy
      ratings:
        condition: service_started

  notification:
    build:
      context: .
      dockerfile: build/Dockerfile.notification
    ports:
      - "8084:8080"
      - "9094:9090"
    environment:
      SERVICE_NAME: notification
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://bookinfo:bookinfo@postgres:5432/bookinfo_notification?sslmode=disable
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  productpage:
    build:
      context: .
      dockerfile: build/Dockerfile.productpage
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      SERVICE_NAME: productpage
      DETAILS_SERVICE_URL: http://details:8080
      REVIEWS_SERVICE_URL: http://reviews:8080
      RATINGS_SERVICE_URL: http://ratings:8080
    depends_on:
      - details
      - reviews
      - ratings

volumes:
  pgdata:
