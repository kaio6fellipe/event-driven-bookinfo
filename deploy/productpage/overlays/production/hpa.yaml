apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: productpage
  labels:
    app: productpage
    part-of: event-driven-bookinfo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: productpage
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
